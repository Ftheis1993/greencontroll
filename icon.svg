<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a30" />
      <stop offset="50%" stop-color="#151518" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>

    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#b0b0c0" />
      <stop offset="70%" stop-color="#606070" />
      <stop offset="100%" stop-color="#2a2a30" />
    </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <path id="leaflet" d="M256 70 C 295 180, 275 300, 256 340 C 237 300, 217 180, 256 70 Z" />

    <g id="fullLeaf">
      <path d="M 252 330 L 260 330 L 260 410 L 252 410 Z" />
      <use href="#leaflet" transform="translate(256 340) rotate(-75) scale(0.55) translate(-256 -340)" />
      <use href="#leaflet" transform="translate(256 340) rotate(75) scale(0.55) translate(-256 -340)" />
      <use href="#leaflet" transform="translate(256 340) rotate(-40) scale(0.85) translate(-256 -340)" />
      <use href="#leaflet" transform="translate(256 340) rotate(40) scale(0.85) translate(-256 -340)" />
      <use href="#leaflet" />
    </g>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />
  
  <rect x="2" y="2" width="508" height="508" rx="113" fill="none" stroke="#33333c" stroke-width="4" />

  <use href="#fullLeaf" fill="none" stroke="#00ff88" stroke-width="12" filter="url(#neonGlow)" opacity="0.9" />

  <use href="#fullLeaf" fill="url(#metalGrad)" stroke="#00ff88" stroke-width="3" />

  <g stroke-linecap="round">
    <g stroke="#00ff88" stroke-width="4" filter="url(#neonGlow)" opacity="0.8">
      <line x1="256" y1="335" x2="256" y2="85" />
      <line x1="256" y1="335" x2="109" y2="165" />
      <line x1="256" y1="335" x2="403" y2="165" />
      <line x1="256" y1="335" x2="113" y2="302" />
      <line x1="256" y1="335" x2="399" y2="302" />
    </g>
    <g stroke="#ffffff" stroke-width="1.5" opacity="0.7">
      <line x1="256" y1="335" x2="256" y2="85" />
      <line x1="256" y1="335" x2="109" y2="165" />
      <line x1="256" y1="335" x2="403" y2="165" />
      <line x1="256" y1="335" x2="113" y2="302" />
      <line x1="256" y1="335" x2="399" y2="302" />
    </g>
  </g>

</svg>
